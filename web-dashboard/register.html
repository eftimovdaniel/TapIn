<!doctype html>
<html lang="mk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TapIn — Регистрација</title>
    <link rel="icon" type="image/png" href="./assets/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./assets/style.css" />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ink: { DEFAULT: "#0A0A0A", 80: "#171717", 60: "#404040", 40: "#737373", 20: "#E5E5E5", 10: "#F5F5F5", 5: "#FAFAFA" },
              accent: "#0A0A0A",
              danger: "#E5484D",
              success: "#30A46C",
            },
            fontFamily: {
              sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'sans-serif'],
              display: ['"Space Grotesk"', 'Inter', 'ui-sans-serif', 'sans-serif'],
            },
          },
        },
      };
    </script>
  </head>
  <body class="min-h-screen bg-white text-ink antialiased font-sans">
    <main class="mx-auto flex min-h-screen w-full max-w-sm flex-col justify-center px-6 py-10">
      <div class="mb-8 flex justify-center">
        <img src="./assets/logo.png" alt="TapIn" class="h-28 w-auto object-contain" />
      </div>

      <div class="mb-8 text-center">
        <h1 class="font-display text-xl font-medium tracking-tight">Регистрирај се</h1>
        <p class="mt-1.5 text-xs text-ink-40">
          Професорски профил за пристап кон контролната табла.
        </p>
      </div>

      <form id="registerForm" class="space-y-4">
        <div>
          <label class="mb-1.5 block text-xs font-medium text-ink-60">Име и презиме</label>
          <input
            id="fullName"
            type="text"
            required
            minlength="2"
            class="w-full rounded-lg border border-ink-20 bg-white px-3.5 py-2.5 text-sm text-ink placeholder:text-ink-40 focus:border-ink focus:ring-2 focus:ring-ink-10 focus:outline-none"
            placeholder="Име Презиме"
          />
        </div>

        <div>
          <label class="mb-1.5 block text-xs font-medium text-ink-60">Е-пошта</label>
          <input
            id="email"
            type="email"
            required
            autocomplete="email"
            class="w-full rounded-lg border border-ink-20 bg-white px-3.5 py-2.5 text-sm text-ink placeholder:text-ink-40 focus:border-ink focus:ring-2 focus:ring-ink-10 focus:outline-none"
            placeholder="ime.prezime@ugd.edu.mk"
          />
        </div>

        <div>
          <label for="password" class="mb-1.5 block text-xs font-medium text-ink-60">Лозинка</label>
          <div class="password-field">
            <input
              id="password"
              type="password"
              required
              minlength="6"
              autocomplete="new-password"
              class="w-full rounded-lg border border-ink-20 bg-white py-2.5 pl-3.5 pr-11 text-sm text-ink placeholder:text-ink-40 focus:border-ink focus:ring-2 focus:ring-ink-10 focus:outline-none"
              placeholder="Мин. 6 знаци"
            />
            <button
              type="button"
              class="password-toggle"
              data-password-toggle
              aria-controls="password"
              aria-label="Покажи лозинка"
            >
              <img
                src="https://img.icons8.com/ios/50/closed-eye.png"
                alt=""
                width="20"
                height="20"
              />
            </button>
          </div>
        </div>

        <p id="error" class="hidden text-sm text-danger"></p>

        <button
          id="submit"
          type="submit"
          class="flex h-11 w-full items-center justify-center rounded-lg bg-ink text-sm font-medium text-white transition hover:bg-ink-80 active:scale-[0.99] disabled:opacity-60"
        >
          <span id="submitLabel">Регистрирај се</span>
          <span id="submitSpinner" class="hidden h-4 w-4 animate-spin rounded-full border-2 border-white border-t-transparent"></span>
        </button>
      </form>

      <p class="mt-8 text-center text-xs text-ink-40">
        Имаш профил?
        <a href="./index.html" class="font-medium text-ink underline-offset-4 hover:underline">Најави се</a>
      </p>
    </main>

    <script type="module" src="./assets/register.js"></script>
  </body>
</html>
